# Dev environment overrides
database:
  host: "localhost"
  name: "trading_ai_dev"
  pool_size: 5

redis:
  host: "localhost"

executor:
  initial_balance: 50.0
  dry_run: true
  max_trades_per_hour: 2
  max_position_pct: 0.20

# Optional preload for warm-start orderbook subscription. Empty = rely entirely
# on PairDiscoverer. Uncomment to preload a few majors for instant first cycle.
# hyperliquid:
#   preload_symbols:
#     - "BTC"
#     - "ETH"
#     - "SOL"

orchestrator:
  cycle_interval_seconds: 30

# 2026-06-04: switching venue to gate.io for paper trading.
# User confirmed gate.io is reachable from their network.
# Same pattern as OKX/Binance: paper mode auto-engages
# when no API keys are set, real Gate.io market data via
# ccxt polling + DoH for DNS bypass.
exchange:
  venue: gate
  market_type: usdt-m-future
  doh: cloudflare

scanner:
  rough_filter_max: 20
  min_sz_decimals: 1
  # 2026-06-04: lowered from 0.35 → 0.25 (matches base.yaml).
  # The confluence engine produces 0.10–0.40 scores; 0.35 filtered
  # out everything except 1–2 symbols. See base.yaml for the full
  # rationale.
  min_confluence_score: 0.25
  min_confirmations: 2

logging:
  level: "DEBUG"

api:
  port: 8001