# Dev environment overrides
database:
  host: "localhost"
  name: "trading_ai_dev"
  pool_size: 5

redis:
  host: "localhost"

risk:
  # 2026-06-05: added max_positions=4 (concurrent) cap. The 14 SHORTs
  # on 2026-06-05 happened because:
  #  - per-position cap (20%) only bounded the *delta*, not the count
  #  - there was no global "no more than N open positions" gate
  # See risk_manager.check_max_positions.
  # 2026-06-07 (v0.2.6): relaxed max_daily_trades 10 -> 60 and
  # max_trades_per_hour 2 -> 10. The walk-forward showed ~2 trades/day
  # average; 60/day is 30x the validated rate, 10/hour is well above
  # the per-second burst rate the cycle interval produces. The
  # structural guards (max_positions, per-cycle cap, regime guard,
  # confluence floor) are what actually prevent recurrence of the
  # 14 SHORTs pattern — the rate caps are now over-engineered.
  max_daily_trades: 60
  max_positions: 4
  # 2026-06-06 (v0.2.1): per-cycle aggregate cap on notional opened
  # into a single symbol. Closes the close+reopen bypass that let
  # ATOM scale to 19.5% of equity via a sequence of flips. Equals
  # max_position_pct by default — a single symbol cannot absorb
  # more than 20% of equity per cycle, regardless of how many
  # times it's closed and reopened. See risk_manager.check_cycle_aggregate.
  max_position_pct_per_cycle: 0.20

executor:
  # 2026-06-07 (v0.2.7): dropped to 10.0 for a fresh data-collection
  # baseline. Paper mode will accumulate from here, and the launcher
  # sets HL_EXECUTOR_INITIAL_BALANCE on every start from
  # data/bot_equity.json (v0.2.6+). The value below is the FALLBACK
  # for first-ever starts when no state file exists yet.
  initial_balance: 10.0
  dry_run: true
  max_trades_per_hour: 10
  max_position_pct: 0.20

# Optional preload for warm-start orderbook subscription. Empty = rely entirely
# on PairDiscoverer. Uncomment to preload a few majors for instant first cycle.
# hyperliquid:
#   preload_symbols:
#     - "BTC"
#     - "ETH"
#     - "SOL"

orchestrator:
  cycle_interval_seconds: 30

# 2026-06-04: switching venue to gate.io for paper trading.
# User confirmed gate.io is reachable from their network.
# Same pattern as OKX/Binance: paper mode auto-engages
# when no API keys are set, real Gate.io market data via
# ccxt polling + DoH for DNS bypass.
exchange:
  venue: gate
  market_type: usdt-m-future
  doh: cloudflare

scanner:
  rough_filter_max: 20
  min_sz_decimals: 1
  # 2026-06-05: bumped 0.25 → 0.35. The 14 SHORTs were all
  # confluence ~0.25-0.32 — too close to the noise floor. 0.35
  # keeps only actionable signals. The engine's audit log
  # showed 0.10-0.40 is the production range, so 0.35 surfaces
  # the top 2-3 pairs per cycle (was 5-8 at 0.25). Tighter
  # than base.yaml because the all-SHORT bias is most acute
  # on marginal signals.
  min_confluence_score: 0.35
  min_confirmations: 2

logging:
  level: "DEBUG"

api:
  port: 8001