# Dev environment overrides
database:
  host: "localhost"
  name: "trading_ai_dev"
  pool_size: 5

redis:
  host: "localhost"

executor:
  initial_balance: 50.0
  dry_run: true
  max_trades_per_hour: 2
  max_position_pct: 0.20

# Optional preload for warm-start orderbook subscription. Empty = rely entirely
# on PairDiscoverer. Uncomment to preload a few majors for instant first cycle.
# hyperliquid:
#   preload_symbols:
#     - "BTC"
#     - "ETH"
#     - "SOL"

orchestrator:
  cycle_interval_seconds: 30

# 2026-06-04: reverted venue to hyperliquid. The Binance paper
# path is wired in code (PaperExecutor handles venue=='binance'
# with ccxt polling + DoH for DNS bypass) but the network here
# is firewall-blocked at the IP layer, not just DNS. The DoH
# resolver returns correct Binance IPs (13.249.239.121 etc.) but
# the actual TCP connection is hijacked by a captive portal.
# Need a proxy or VPN to actually reach Binance. To re-enable
# Binance once you have a proxy, set venue: binance here.
exchange:
  venue: hyperliquid
  market_type: usdt-m-future
  doh: cloudflare

scanner:
  rough_filter_max: 20
  min_sz_decimals: 1
  # 2026-06-04: lowered from 0.35 → 0.25 (matches base.yaml).
  # The confluence engine produces 0.10–0.40 scores; 0.35 filtered
  # out everything except 1–2 symbols. See base.yaml for the full
  # rationale.
  min_confluence_score: 0.25
  min_confirmations: 2

logging:
  level: "DEBUG"

api:
  port: 8001